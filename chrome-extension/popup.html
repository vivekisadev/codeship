<!DOCTYPE html>
<html>
<head>
  <title>LeetSync</title>
  <style>
    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #060608;
      color: #f8fafc;
      margin: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .icon {
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 6px;
      border-radius: 8px;
      display: flex;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0;
      color: #ffffff;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 0.875rem;
      color: #94a3b8;
      line-height: 1.5;
      margin: 0 0 20px 0;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #10b981;
      background: rgba(16, 185, 129, 0.1);
      padding: 4px 8px;
      border-radius: 12px;
      width: fit-content;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
    }
    .btn {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 10px;
      background: #ffa116;
      color: #000000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.875rem;
      text-decoration: none;
      box-sizing: border-box;
      transition: background 0.2s ease;
    }
    .btn:hover {
      background: #e59013;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffa116" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
    </div>
    <h1>LeetSync</h1>
  </div>
  
  <div class="status">
    <div class="status-dot"></div>
    Extension Active
  </div>

  <p>Leave this extension running in the background. Your accepted LeetCode solutions will automatically be captured and pushed to your GitHub repository.</p>
  
  <a href="https://leetsync-bay.vercel.app/dashboard" target="_blank" class="btn">View Dashboard</a>
  
  <script src="popup.js"></script>
</body>
</html>
